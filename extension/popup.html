<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Browser Agent</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 320px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
      color: #333;
    }

    h1 {
      font-size: 18px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo {
      font-size: 24px;
    }

    .status {
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .status.connected {
      background: #e8f5e9;
      color: #2e7d32;
    }

    .status.disconnected {
      background: #ffebee;
      color: #c62828;
    }

    .indicator {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }

    .indicator.connected {
      background: #4caf50;
    }

    .indicator.disconnected {
      background: #f44336;
    }

    .info {
      background: #f5f5f5;
      padding: 12px;
      border-radius: 8px;
      font-size: 12px;
      color: #666;
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 6px;
    }

    .info-row:last-child {
      margin-bottom: 0;
    }

    .label {
      font-weight: 500;
    }

    .value {
      font-family: monospace;
      font-size: 11px;
    }

    .footer {
      margin-top: 16px;
      text-align: center;
      font-size: 11px;
      color: #999;
    }

    .footer a {
      color: #1976d2;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <h1>
    <span class="logo">🌐</span>
    Browser Agent
  </h1>

  <div id="status" class="status disconnected">
    <div class="indicator disconnected"></div>
    <span>Connecting...</span>
  </div>

  <div class="info">
    <div class="info-row">
      <span class="label">Profile ID:</span>
      <span class="value" id="profileId">Loading...</span>
    </div>
    <div class="info-row">
      <span class="label">Bridge:</span>
      <span class="value">localhost:18792</span>
    </div>
    <div class="info-row">
      <span class="label">Version:</span>
      <span class="value">1.0.0</span>
    </div>
  </div>

  <div class="footer">
    Part of <a href="#" target="_blank">WS Workspace</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
